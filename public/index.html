<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#F5EAD2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Worgent — daily word gauntlet</title>
<style>
  :root{
    --cream:#F5EAD2;
    --white:#FFFFFF;
    --sand:#D4B080;
    --orange:#E07028;
    --amber:#F0A820;
    --teal:#5BBDB8;
    --brown:#4A2C1A;
    --charcoal:#2E2B27;
    --brick:#C4433A;
    --sage:#5B8A4A;
    --gray:#5A5C5E;
    --safe-top:env(safe-area-inset-top, 0);
    --safe-bottom:env(safe-area-inset-bottom, 0);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;overscroll-behavior:none}
  body{
    background:var(--cream);
    color:var(--charcoal);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;line-height:1.4;
    min-height:100vh;min-height:100dvh;
    overflow-x:hidden;-webkit-text-size-adjust:100%;
    touch-action:manipulation;
  }
  #app{
    max-width:480px;margin:0 auto;
    padding:calc(10px + var(--safe-top)) 12px calc(16px + var(--safe-bottom));
    display:flex;flex-direction:column;
    min-height:100vh;min-height:100dvh;
    position:relative;
  }
  header{position:relative;padding:6px 0 8px;text-align:center}
  .stripes{
    position:absolute;left:-12px;right:-12px;height:8px;top:-2px;
    background:repeating-linear-gradient(90deg,
      var(--orange) 0 28px,
      var(--amber) 28px 56px,
      var(--teal) 56px 84px,
      var(--brown) 84px 112px);
    opacity:.85;
  }
  #statsbtn, #rulesbtn{
    position:absolute;top:28px;
    background:var(--white);border:2px solid var(--sand);
    cursor:pointer;font-size:18px;line-height:1;
    width:38px;height:38px;
    display:flex;align-items:center;justify-content:center;
    border-radius:10px;
    transition:transform .1s, background .15s, border-color .15s;
    z-index:65;
    color:var(--brown);font-weight:800;font-family:inherit;
  }
  #statsbtn{right:0}
  #rulesbtn{right:46px}
  #statsbtn:hover, #rulesbtn:hover{background:var(--cream);border-color:var(--brown)}
  #statsbtn:active, #rulesbtn:active{transform:scale(.92)}
  /* Hide the ? and stats buttons whenever a modal/panel is open so they don't
     overlap modals (mobile especially) and can't be tapped through. */
  body:has(#overlay.show) #statsbtn,
  body:has(#overlay.show) #rulesbtn,
  body:has(#stats-panel.show) #statsbtn,
  body:has(#stats-panel.show) #rulesbtn{
    opacity:0;visibility:hidden;pointer-events:none;
  }
  h1.logo{
    margin:18px 0 4px;font-size:36px;font-weight:900;
    letter-spacing:.14em;color:var(--charcoal);text-transform:uppercase;
    font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
    text-shadow:2px 2px 0 var(--orange);
  }
  .tagline{
    font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--brown);opacity:.8;margin:0 0 8px;
  }
  .mode-toggle{
    display:inline-flex;
    background:var(--white);
    border:2px solid var(--sand);
    border-radius:20px;
    padding:3px;
    margin:0 0 10px;
    gap:2px;
  }
  .mode-pill{
    padding:6px 16px;
    border:none;background:transparent;
    border-radius:16px;
    font-family:inherit;font-size:12px;font-weight:800;
    letter-spacing:.12em;text-transform:uppercase;
    color:var(--brown);cursor:pointer;
    transition:background .2s, color .2s;
    min-height:30px;
    touch-action:manipulation;
  }
  .mode-pill.active{background:var(--orange);color:var(--white)}
  .mode-pill:not(.active):hover{background:rgba(74,44,26,.08)}
  .progress{display:flex;justify-content:center;gap:8px;margin:6px 0 8px}
  .pip{
    width:14px;height:14px;border-radius:50%;
    border:2px solid var(--sand);background:transparent;
    transition:all .25s;
  }
  .pip.done{background:var(--orange);border-color:var(--orange)}
  .pip.cur{background:var(--amber);border-color:var(--amber);
    box-shadow:0 0 0 3px rgba(240,168,32,.25)}
  .meta{
    display:flex;justify-content:space-between;align-items:center;
    margin:4px 4px 6px;font-size:13px;gap:8px;
  }
  .roundlbl{font-weight:700;color:var(--charcoal);letter-spacing:.04em;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .timer{
    font-variant-numeric:tabular-nums;font-weight:800;font-size:20px;
    color:var(--brown);background:var(--white);
    padding:2px 10px;border-radius:10px;
    border:2px solid var(--sand);
    transition:color .3s, border-color .3s;
    flex-shrink:0;
  }
  .timer.urgent{
    color:var(--brick);border-color:var(--brick);
    animation:pulse 1s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(196,67,58,0)}
    50%{transform:scale(1.04);box-shadow:0 0 0 6px rgba(196,67,58,.15)}
  }
  #board-wrap{
    flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:flex-start;
    margin:8px 0 8px;min-height:80px;width:100%;
  }
  #board{
    display:flex;flex-direction:column;gap:6px;align-items:center;
    max-height:42vh;max-height:42dvh;
    overflow-y:auto;overflow-x:hidden;
    padding:4px 2px;width:100%;
    -webkit-overflow-scrolling:touch;
  }
  #board::-webkit-scrollbar{width:4px}
  #board::-webkit-scrollbar-thumb{background:var(--sand);border-radius:4px}
  .row{display:flex;gap:5px;justify-content:center;width:100%}
  .tile{
    width:clamp(30px, 11vw, 50px);
    height:clamp(30px, 11vw, 50px);
    background:var(--white);border:2px solid var(--sand);
    border-radius:9px;
    display:flex;align-items:center;justify-content:center;
    font-size:clamp(16px, 5vw, 24px);
    font-weight:800;color:var(--charcoal);text-transform:uppercase;
    transition:transform .12s;perspective:600px;flex-shrink:0;
  }
  .tile.filled{border-color:rgba(46,43,39,.55)}
  .row.current .tile.filled{border-color:rgba(46,43,39,.7)}
  .tile.flip{animation:flip .55s ease forwards}
  @keyframes flip{
    0%{transform:rotateX(0)}
    49%{transform:rotateX(90deg);background:var(--white);color:var(--charcoal);border-color:var(--sand)}
    50%{transform:rotateX(90deg)}
    100%{transform:rotateX(0)}
  }
  .tile.green{background:var(--sage);border-color:var(--sage);color:#fff}
  .tile.amber{background:var(--amber);border-color:var(--amber);color:var(--charcoal)}
  .tile.red{background:var(--gray);border-color:var(--gray);color:#fff}
  .row.shake{animation:shake .42s}
  @keyframes shake{
    10%,90%{transform:translateX(-2px)}
    20%,80%{transform:translateX(4px)}
    30%,50%,70%{transform:translateX(-7px)}
    40%,60%{transform:translateX(7px)}
  }
  .tile.bounce{animation:bounce .55s ease}
  @keyframes bounce{
    0%,100%{transform:translateY(0)}
    40%{transform:translateY(-14px)}
    60%{transform:translateY(-6px)}
  }
  #message{
    text-align:center;min-height:22px;
    font-weight:700;color:var(--brown);
    font-size:14px;letter-spacing:.04em;margin:2px 0 6px;
  }
  #keyboard{
    display:flex;flex-direction:column;gap:5px;align-items:center;
    margin-top:auto;padding-top:6px;width:100%;
  }
  .krow{display:flex;gap:4px;justify-content:center;width:100%}
  .key{
    flex:1;min-width:0;
    height:clamp(40px, 11vw, 52px);
    background:var(--sand);color:var(--charcoal);
    border:none;border-radius:7px;
    font-size:clamp(13px, 4vw, 16px);
    font-weight:700;text-transform:uppercase;cursor:pointer;
    transition:transform .08s, background .25s, opacity .25s, color .25s;
    font-family:inherit;padding:0 2px;
    -webkit-user-select:none;user-select:none;
    touch-action:manipulation;
  }
  .key.wide{flex:1.5;background:var(--brown);color:var(--white);
    font-size:clamp(10px, 3vw, 12px);letter-spacing:.06em}
  .key:active{transform:scale(.92)}
  .key.green{background:var(--sage);color:#fff}
  .key.amber{background:var(--amber);color:var(--charcoal)}
  .key.red{background:var(--gray);color:#fff;opacity:.7}
  #overlay{
    position:fixed;inset:0;background:rgba(46,43,39,.55);
    display:none;align-items:center;justify-content:center;
    padding:16px;z-index:50;backdrop-filter:blur(2px);
  }
  #overlay.show{display:flex;animation:fade .3s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .card{
    background:var(--cream);border:3px solid var(--brown);
    border-radius:18px;padding:20px 18px 16px;
    width:100%;max-width:400px;text-align:center;
    box-shadow:6px 6px 0 var(--orange);
    max-height:90vh;max-height:90dvh;overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
  .card h2{margin:0 0 6px;font-size:22px;letter-spacing:.06em;
    color:var(--charcoal);text-transform:uppercase;}
  .card .word{
    font-size:28px;font-weight:900;letter-spacing:.18em;
    color:var(--orange);margin:8px 0 14px;text-transform:uppercase;
    word-break:break-word;
  }
  .card .stat{
    display:flex;justify-content:space-between;
    padding:6px 4px;border-bottom:1px dashed var(--sand);font-size:15px;
  }
  .card .stat:last-of-type{border-bottom:none}
  .card .stat b{color:var(--brown);font-weight:800}
  .btn{
    display:inline-block;background:var(--teal);color:var(--charcoal);
    border:none;border-radius:12px;padding:14px 18px;
    font-size:15px;font-weight:800;letter-spacing:.06em;
    text-transform:uppercase;cursor:pointer;margin-top:12px;
    font-family:inherit;box-shadow:3px 3px 0 var(--brown);
    transition:transform .1s;min-height:44px;touch-action:manipulation;
  }
  .btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--brown)}
  .btn.secondary{background:var(--sand)}
  .btn.share{background:var(--orange);color:#fff}
  .results-table{width:100%;border-collapse:collapse;margin:10px 0 6px;font-size:13px}
  .results-table th, .results-table td{
    padding:6px 3px;text-align:center;border-bottom:1px dashed var(--sand);
  }
  .results-table th{font-size:10px;letter-spacing:.06em;color:var(--brown);text-transform:uppercase}
  .results-table td.score{font-weight:800;color:var(--orange)}
  .results-table tr.clickable{cursor:pointer;transition:background .15s}
  .results-table tr.clickable:hover{background:rgba(224,112,40,.08)}
  .total{
    font-size:32px;font-weight:900;color:var(--orange);
    margin:8px 0 2px;letter-spacing:.04em;
  }
  .rating{
    font-size:17px;font-weight:800;letter-spacing:.08em;
    color:var(--charcoal);text-transform:uppercase;margin-bottom:6px;
  }
  .countdown{
    font-size:13px;color:var(--brown);margin-top:10px;
    font-variant-numeric:tabular-nums;
  }
  .toast{
    position:fixed;left:50%;top:18%;transform:translateX(-50%);
    background:var(--charcoal);color:var(--cream);
    padding:10px 18px;border-radius:10px;font-weight:700;font-size:14px;
    z-index:100;opacity:0;pointer-events:none;
    transition:opacity .25s, transform .25s;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(4px)}
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0 14px}
  .stat-tile{background:var(--white);border:2px solid var(--sand);
    border-radius:10px;padding:8px 4px;text-align:center}
  .stat-tile b{display:block;font-size:20px;font-weight:900;color:var(--orange);
    line-height:1.1;font-variant-numeric:tabular-nums}
  .stat-tile span{display:block;font-size:9px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--brown);margin-top:2px}
  .section-title{font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--brown);margin:14px 0 6px;font-weight:800;text-align:left}
  .perround-table{width:100%;border-collapse:collapse;font-size:12px}
  .perround-table th, .perround-table td{
    padding:5px 2px;text-align:center;border-bottom:1px dashed var(--sand);
  }
  .perround-table th{font-size:9px;letter-spacing:.04em;color:var(--brown);text-transform:uppercase}
  .perround-table td:first-child{font-weight:800;color:var(--charcoal)}
  .histo{display:flex;align-items:flex-end;gap:3px;height:90px;margin:4px 0 4px;padding:0 2px}
  .histo-bar{flex:1;background:var(--sand);border-radius:3px 3px 0 0;
    position:relative;min-height:2px;transition:background .2s}
  .histo-bar.cur{background:var(--orange)}
  .histo-bar:hover{background:var(--amber)}
  .histo-axis{display:flex;justify-content:space-between;
    font-size:9px;color:var(--brown);margin-top:2px;letter-spacing:.04em}
  .empty-msg{color:var(--brown);opacity:.7;font-size:13px;
    padding:14px 4px;text-align:center;font-style:italic}
  .panel-backdrop{
    position:fixed;inset:0;background:rgba(46,43,39,.45);
    opacity:0;pointer-events:none;
    transition:opacity .25s;z-index:60;backdrop-filter:blur(2px);
  }
  .panel-backdrop.show{opacity:1;pointer-events:auto}
  .side-panel{
    position:fixed;top:0;right:0;bottom:0;
    width:360px;max-width:100vw;
    background:var(--cream);
    border-left:3px solid var(--brown);
    box-shadow:-6px 0 0 var(--orange), -10px 0 24px rgba(46,43,39,.18);
    transform:translateX(110%);
    transition:transform .3s cubic-bezier(.2,.8,.2,1);
    z-index:70;
    display:flex;flex-direction:column;
    padding:calc(16px + var(--safe-top)) 16px calc(16px + var(--safe-bottom));
    overflow-y:auto;-webkit-overflow-scrolling:touch;
  }
  .side-panel.show{transform:translateX(0)}
  .side-panel-header{
    display:flex;align-items:center;justify-content:space-between;
    margin-bottom:6px;
  }
  .side-panel h2{margin:0;font-size:20px;letter-spacing:.06em;
    color:var(--charcoal);text-transform:uppercase}
  .closebtn{
    background:transparent;border:none;cursor:pointer;
    font-size:28px;line-height:1;color:var(--brown);
    padding:4px 10px;border-radius:8px;
    transition:background .15s;font-family:inherit;font-weight:700;
    min-width:44px;min-height:44px;
    display:flex;align-items:center;justify-content:center;
    touch-action:manipulation;
  }
  .closebtn:hover{background:rgba(74,44,26,.1)}
  .closebtn:active{background:rgba(74,44,26,.2)}
  /* === RULES / WELCOME === */
  .rules-section{margin:14px 0 6px;text-align:left}
  .rules-section h3{
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--brown);margin:0 0 6px;font-weight:800;
  }
  .rules-section p{
    font-size:13px;color:var(--charcoal);margin:0 0 8px;line-height:1.45;
  }
  .rules-tile-row{
    display:flex;gap:6px;align-items:center;
    margin:6px 0;font-size:13px;text-align:left;
  }
  .rules-tile{
    width:28px;height:28px;border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:14px;flex-shrink:0;
  }
  .rules-tile.green{background:var(--sage);color:#fff}
  .rules-tile.amber{background:var(--amber);color:var(--charcoal)}
  .rules-tile.red{background:var(--gray);color:#fff}
  .rules-formula{
    background:var(--white);
    border:2px dashed var(--sand);
    border-radius:8px;
    padding:8px 10px;margin:8px 0;
    font-family:'Courier New',monospace;
    font-size:12px;text-align:center;color:var(--brown);
    font-weight:700;
  }
  .welcome-modes{
    display:flex;flex-direction:column;gap:8px;margin-top:14px;
  }
  .welcome-modes .btn{
    width:100%;margin-top:0;
  }
  /* === REVIEW MODE === */
  .review-bar{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--white);
    border:2px solid var(--sand);
    border-radius:12px;
    padding:6px 8px;
    margin:4px 0 8px;
    gap:6px;
  }
  .review-arrow{
    background:var(--brown);color:var(--white);
    border:none;border-radius:8px;
    width:36px;height:36px;
    font-size:18px;font-weight:800;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-family:inherit;
    touch-action:manipulation;
    transition:transform .1s, opacity .15s;
  }
  .review-arrow:active{transform:scale(.92)}
  .review-arrow:disabled{opacity:.3;cursor:not-allowed}
  .review-info{
    flex:1;text-align:center;
    font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--charcoal);font-weight:800;
    line-height:1.2;
  }
  .review-info b{
    display:block;font-size:18px;color:var(--orange);
    letter-spacing:.16em;margin-top:2px;
  }
  .review-back{
    background:var(--teal);color:var(--charcoal);
    border:none;border-radius:8px;
    padding:8px 12px;
    font-family:inherit;font-size:11px;font-weight:800;
    letter-spacing:.06em;text-transform:uppercase;
    cursor:pointer;
    box-shadow:2px 2px 0 var(--brown);
    transition:transform .1s;
    touch-action:manipulation;
  }
  .review-back:active{transform:translate(2px,2px);box-shadow:none}
  @media (max-width:420px){
    #app{padding-left:10px;padding-right:10px}
    h1.logo{font-size:32px;letter-spacing:.12em;margin:14px 0 2px}
    .tagline{font-size:10px;margin-bottom:6px}
    #statsbtn, #rulesbtn{width:36px;height:36px;font-size:16px;top:24px}
    #rulesbtn{right:42px}
    .roundlbl{font-size:12px}
    .timer{font-size:18px;padding:2px 8px}
    .row{gap:4px}
    .krow{gap:3px}
    .card{padding:18px 14px 14px;max-width:100%}
    .card h2{font-size:20px}
    .card .word{font-size:24px;letter-spacing:.14em}
    .total{font-size:28px}
    .rating{font-size:15px}
    .stat-tile b{font-size:18px}
    .stats-grid{gap:5px}
    .results-table{font-size:12px}
    .results-table th{font-size:9px}
    .mode-pill{padding:6px 12px;font-size:11px}
  }
  @media (max-width:360px){
    h1.logo{font-size:28px}
    .stat-tile b{font-size:16px}
    .stat-tile span{font-size:8px}
    .perround-table{font-size:11px}
    .mode-pill{padding:5px 10px;font-size:10px;letter-spacing:.08em}
  }
  @media (max-width:480px){
    .side-panel{width:100vw;border-left:none;border-top:3px solid var(--brown);
      box-shadow:0 -6px 0 var(--orange), 0 -10px 24px rgba(46,43,39,.18)}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="stripes" aria-hidden="true"></div>
    <button id="rulesbtn" aria-label="How to play" title="How to play">?</button>
    <button id="statsbtn" aria-label="View stats" title="Stats">📊</button>
    <h1 class="logo">Worgent</h1>
    <p class="tagline">five words · one day · one shot <span style="opacity:.4;font-size:9px">v1.26</span></p>
    <div class="mode-toggle" role="tablist" aria-label="Game mode">
      <button class="mode-pill active" id="mode-daily" role="tab" aria-selected="true">Daily</button>
      <button class="mode-pill" id="mode-freeplay" role="tab" aria-selected="false">Freeplay</button>
    </div>
    <div class="progress" id="progress" aria-label="Round progress"></div>
    <div class="meta">
      <span class="roundlbl" id="roundlbl">Round 1 — 3 letters</span>
      <span class="timer" id="timer" aria-live="off">0:00</span>
    </div>
  </header>
  <div id="board-wrap">
    <div id="board" aria-label="Guess board"></div>
  </div>
  <div id="message" aria-live="polite"></div>
  <div id="keyboard" aria-label="On-screen keyboard"></div>
  <div class="sr" id="sr-live" aria-live="polite"></div>
</div>
<div id="overlay" role="dialog" aria-modal="true"></div>
<div class="panel-backdrop" id="panel-backdrop"></div>
<aside class="side-panel" id="stats-panel" role="dialog" aria-modal="false" aria-labelledby="stats-title" hidden></aside>
<div class="toast" id="toast"></div>
<script>
"use strict";
// Dictionary used to validate guesses. The answer pool itself lives only
// on the server now (see worker/words.js) so daily answers can't be

    <div class="rules-tile-row"><div class="rules-tile red">A</div><span>letter not in the word</span></div>
    <p>No guess limit — keep going until you get it. Invalid words shake and clear automatically so you can keep trying.</p>
  </div>
  <div class="rules-section">
    <h3>Scoring</h3>
    <p>Each round earns up to <b>2000 points</b>: 1000 for speed and 1000 for guess count. Both decay quickly at first then slow down — so taking your time or guessing a few extra still pays off. Game total caps at <b>10000</b>.</p>
  </div>
  <div class="rules-section">
    <h3>Daily vs Freeplay</h3>
    <p><b>Daily</b> — same five words for everyone, fresh at midnight. Builds your streak and stats.</p>
    <p><b>Freeplay</b> — random words, unlimited replays. Doesn't affect your stats.</p>
  </div>
`;

const ROUND_LENGTHS = [3, 4, 5, 6, 7];

// User-requested word additions not in the base Hunspell dictionary.
// These get merged into VALID at startup so they're accepted as guesses.
// Add new words here whenever a player reports a missing legitimate word.
const EXTRAS = [
  // Informal / colloquial adjectives & nouns
  'poop','poops','pooped','pooper','poopers','poopy','poopier','poopiest',
  'goopy','goopier','goopiest',
  'derp','derpy','derps','derped',
  'meh','vibe','vibes','vibed','vibing','vibey',
  'omg','lol','wtf','tbh','imo','imho','irl','meta','metas',
  'selfie','selfies',
  'stan','stans','stanned','stanning',
  'ghosted','ghosting',
  'totes','obvi','adorbs',
  'lit','litty','sus',
  'yeet','yeeted','yeeting','yeets',
  'bops','bop','bopped','bopping',
  'simp','simps','simped','simping',
  'glow','glowed','glowing',
  'cringe','cringed','cringes','cringing','cringy','cringey',
  'doxx','doxxed','doxxing',
  // Holiday-override answer words — kept here so VALID accepts them as
  // guesses even though some aren't in a standard dictionary. Mirrors
  // the HOLIDAYS table in worker/puzzle.js. Update both lists together.
  'arr','ale','bash','bats','beach','boo','burrito','carol','carolers','cheers',
  'clover','clowns','cupids','dark','den','dessert','earth','eat','ecology','elf',
  'emerald','end','eve','fiesta','flag','foe','fool','force','freedom','galaxy',
  'gold','goodbye','grog','hah','heart','heat','heroes','honor','hug','irish',
  'jedi','joker','jolly','kiss','love','math','nation','newyear','number','oak',
  'parrot','party','pearl','pie','pirates','planet','present','prophet','pumpkin',
  'respect','rodent','romance','sleigh','slice','snow','solstice','solway','spicy',
  'spider','stars','summer','sun','sunburn','taco','toast','tree','tricked','trooper',
  'wakes','war','winter','witch',
];
(function mergeExtras(){
  if (typeof VALID === 'undefined') return;
  for (const w of EXTRAS){
    const L = w.length;
    if (L >= 3 && L <= 7 && VALID[L]) VALID[L].add(w);
  }
})();
const STORAGE_KEY_DAILY = 'worgent_state_v1';
const STORAGE_KEY_FREEPLAY = 'worgent_freeplay_state_v1';
const STORAGE_DATE = 'worgent_date_v1';
const STORAGE_HISTORY = 'worgent_history_v1';
const STORAGE_MODE = 'worgent_mode_v1';
// EPOCH and todayDayIndex use UTC midnights so the dayIdx math is
// timezone- and DST-independent. The server (worker/puzzle.js) maps
// dayIdx -> 'MM-DD' via Date.UTC(2025,0,1) + dayIdx*86400000, so the
// client must use the same UTC anchor or the two will disagree across
// DST boundaries (e.g. local-time subtraction silently drops a day in
// spring/summer because of the spring-forward hour).
const EPOCH_UTC = Date.UTC(2025, 0, 1);

function todayDayIndex(){
  const now = new Date();
  const todayUTC = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.floor((todayUTC - EPOCH_UTC) / 86400000);
}
// Format the puzzle's date as "May 3, 2026" — used in result heading & share text
function formatPuzzleDate(dayIdx){
  const d = new Date(EPOCH_UTC + dayIdx * 86400000);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[d.getUTCMonth()]} ${d.getUTCDate()}, ${d.getUTCFullYear()}`;
}

// --- Server API client -------------------------------------------------
// Daily-puzzle answers live on the server (see worker/index.js). The
// client never sees the answer until the player wins or runs out of
// time. Freeplay answers are still chosen by the server but sent to
// the client so freeplay can validate locally — there's no leaderboard
// to protect for freeplay.
async function postJson(path, body){
  const res = await fetch(path, {
    method: 'POST',
    headers: { 'content-type': 'application/json' },
    body: body ? JSON.stringify(body) : '{}',
  });
  let data = null;
  try { data = await res.json(); } catch(e){}
  if (!res.ok || !data || data.ok === false){
    const msg = (data && data.error) || ('HTTP ' + res.status);
    throw new Error(msg);
  }
  return data;
}
async function fetchGuess(dayIdx, roundIndex, guess){
  return postJson('/api/guess', { dayIdx, roundIndex, guess });
}
async function fetchReveal(dayIdx, roundIndex){
  const data = await postJson('/api/reveal', { dayIdx, roundIndex });
  return data.answer;
}
async function fetchFreeplayWords(){
  const data = await postJson('/api/freeplay/words');
  return data.words;
}

let state = null;
let timerInterval = null;
let roundStartMs = 0;
let inputLocked = false;
let currentGuess = '';
const dayIdx = todayDayIndex();

// Build a fresh state for either mode. Daily mode leaves words as nulls
// because the server holds the answers — they get filled in only when a
// guess is solved or the player times out. Freeplay mode fetches its
// random words from the server up front (no anti-cheat needed; just a
// place to keep the answer pool).
async function freshState(mode){
  let words;
  if (mode === 'freeplay'){
    words = await fetchFreeplayWords();
  } else {
    words = ROUND_LENGTHS.map(() => null);
  }
  return {
    mode, dayIdx, round: 0, words,
    rounds: ROUND_LENGTHS.map(L => ({
      length: L, guesses: [], wrong: 0, secs: 0, score: 0, timeScore: 0, guessScore: 0, status: 'pending',
    })),
    finished: false,
    currentGuess: '',
    sessionId: mode === 'freeplay' ? Date.now() : null,
  };
}

// Pull current elapsed time into state so it's saved precisely.
function syncTimerToState(){
  if (!state || state.finished) return;
  const r = state.rounds[state.round];
  if (!r || r.status !== 'pending') return;
  if (roundStartMs > 0){
    r.secs = Math.floor((Date.now() - roundStartMs) / 1000);
  }
}

function storageKeyFor(mode){
  return mode === 'freeplay' ? STORAGE_KEY_FREEPLAY : STORAGE_KEY_DAILY;
}

async function loadState(mode){
  if (mode === 'daily'){
    const storedDate = localStorage.getItem(STORAGE_DATE);
    const todayStr = String(dayIdx);
    if (storedDate !== todayStr){
      // New day -> stale answers and progress. Wipe and start fresh.
      localStorage.removeItem(STORAGE_KEY_DAILY);
      localStorage.setItem(STORAGE_DATE, todayStr);
      return freshState('daily');
    }
    try{
      const raw = localStorage.getItem(STORAGE_KEY_DAILY);
      if (!raw) return freshState('daily');
      const parsed = JSON.parse(raw);
      // The server is the only place that knows the answer for an
      // unsolved round. Wipe parsed.words[i] unless that round is
      // already finished — kept ones are needed by the round-complete
      // overlay and the final results card. This matters for two cases:
      //   1. Legacy saves from pre-server-validation builds, which had
      //      every answer baked into parsed.words.
      //   2. Defensive: any future code path that accidentally writes
      //      an answer into state.words for a pending round.
      const legacyWords = Array.isArray(parsed.words) ? parsed.words : [];
      parsed.words = ROUND_LENGTHS.map((_, i) => {
        const r = parsed.rounds && parsed.rounds[i];
        const finished = r && (r.status === 'won' || r.status === 'timeout');
        return finished ? (legacyWords[i] || null) : null;
      });
      parsed.mode = 'daily';
      if (typeof parsed.currentGuess !== 'string') parsed.currentGuess = '';
      return parsed;
    }catch(e){ return freshState('daily'); }
  } else {
    try{
      const raw = localStorage.getItem(STORAGE_KEY_FREEPLAY);
      if (!raw) return freshState('freeplay');
      const parsed = JSON.parse(raw);
      parsed.mode = 'freeplay';
      if (typeof parsed.currentGuess !== 'string') parsed.currentGuess = '';
      // If saved freeplay somehow lacks words (shouldn't normally), refetch.
      if (!Array.isArray(parsed.words) || parsed.words.some(w => !w)){
        parsed.words = await fetchFreeplayWords();
      }
      return parsed;
    }catch(e){ return freshState('freeplay'); }
  }
}

function saveState(){
  try{
    syncTimerToState();
    state.currentGuess = currentGuess;
    localStorage.setItem(storageKeyFor(state.mode), JSON.stringify(state));
    localStorage.setItem(STORAGE_MODE, state.mode);
    if (state.mode === 'daily') localStorage.setItem(STORAGE_DATE, String(dayIdx));
  }catch(e){}
}

// History (DAILY ONLY)
function loadHistory(){
  try {
    const raw = localStorage.getItem(STORAGE_HISTORY);
    if (!raw) return [];
    const h = JSON.parse(raw);
    return Array.isArray(h) ? h : [];
  } catch(e){ return []; }
}
function saveHistory(h){
  try { localStorage.setItem(STORAGE_HISTORY, JSON.stringify(h)); } catch(e){}
}
function recordTodayInHistory(){
  if (state.mode !== 'daily') return null;
  const h = loadHistory();
  const filtered = h.filter(g => g.dayIdx !== state.dayIdx);
  const total = state.rounds.reduce((s,r)=>s+r.score, 0);
  const entry = {
    dayIdx: state.dayIdx, total,
    rounds: state.rounds.map(r => ({
      length: r.length, secs: r.secs, wrong: r.wrong,
      guesses: r.guesses.length, score: r.score, status: r.status,
    })),
    finishedAt: Date.now(),
  };
  filtered.push(entry);
  filtered.sort((a,b)=>a.dayIdx - b.dayIdx);
  saveHistory(filtered);
  return entry;
}
function computeStats(history){
  const games = history.length;
  if (games === 0){
    return { games:0, streak:0, maxStreak:0, best:0, avg:0, winRate:0, perLen:{}, totals:[] };
  }
  const totals = history.map(g => g.total);
  const best = Math.max(...totals);
  const avg = Math.round(totals.reduce((a,b)=>a+b,0) / games);
  const wins = history.filter(g => g.rounds.some(r => r.status === 'won')).length;
  const days = new Set(history.map(g => g.dayIdx));
  const today = todayDayIndex();
  let streak = 0;
  let cur = days.has(today) ? today : today - 1;
  while (days.has(cur)){ streak++; cur--; }
  const sortedDays = [...days].sort((a,b)=>a-b);
  let maxStreak = 0, run = 0, prev = null;
  for (const d of sortedDays){
    if (prev !== null && d === prev + 1) run++;
    else run = 1;
    if (run > maxStreak) maxStreak = run;
    prev = d;
  }
  const perLen = {};
  for (const L of ROUND_LENGTHS){
    const rs = history.flatMap(g => g.rounds.filter(r => r.length === L));
    const won = rs.filter(r => r.status === 'won');
    const fastest = won.length ? Math.min(...won.map(r => r.secs)) : null;
    const avgGuess = rs.length ? (rs.reduce((s,r)=>s+r.guesses,0) / rs.length) : 0;
    const avgScore = rs.length ? Math.round(rs.reduce((s,r)=>s+r.score,0) / rs.length) : 0;
    const winPct = rs.length ? Math.round(100 * won.length / rs.length) : 0;
    perLen[L] = { fastest, avgGuess: avgGuess.toFixed(1), avgScore, winPct, played: rs.length };
  }
  return { games, streak, maxStreak, best, avg, winRate: Math.round(100 * wins / games), perLen, totals };
}

function evaluateGuess(guess, answer){
  guess = guess.toUpperCase();
  answer = answer.toUpperCase();
  const len = answer.length;
  const marks = new Array(len).fill('red');
  const counts = {};
  for (let i=0;i<len;i++){
    if (guess[i] === answer[i]){ marks[i] = 'green'; }
    else { counts[answer[i]] = (counts[answer[i]]||0) + 1; }
  }
  for (let i=0;i<len;i++){
    if (marks[i] === 'green') continue;
    const c = guess[i];
    if (counts[c] > 0){ marks[i] = 'amber'; counts[c]--; }
  }
  return marks;
}

// ---- Scoring ----
// Each round earns up to 2000 points (5 rounds × 2000 = 10000 game max).
// The total is split equally:
//   - Time score (max 1000): rewards finishing quickly
//   - Guess score (max 1000): rewards solving in fewer guesses
// Both use exponential decay so first few seconds / first few extra guesses
// cost the most, then diminishing returns. A floor keeps either side from
// dropping to 0 — slow-and-careful and fast-and-many-guesses both stay viable.
const TIME_TAU = 50;     // seconds — larger = slower decay
const GUESS_TAU = 4;     // guesses — larger = slower decay
const SCORE_FLOOR = 50;  // minimum per side (so abandoning ≠ giving up wins)

function calcTimeScore(secs){
  if (!isFinite(secs) || secs <= 0) return 1000;
  const v = 1000 * Math.exp(-secs / TIME_TAU);
  return Math.max(SCORE_FLOOR, Math.round(v));
}
function calcGuessScore(guesses){
  if (!isFinite(guesses) || guesses <= 1) return 1000;
  const v = 1000 * Math.exp(-(guesses - 1) / GUESS_TAU);
  return Math.max(SCORE_FLOOR, Math.round(v));
}
function calcScore(secs, guesses, status){
  if (status === 'timeout') return 0;
  return calcTimeScore(secs) + calcGuessScore(guesses);
}

const $ = (id) => document.getElementById(id);

function renderProgress(){
  const el = $('progress');
  el.innerHTML = '';
  for (let i=0;i<5;i++){
    const pip = document.createElement('div');
    pip.className = 'pip';
    if (i < state.round) pip.classList.add('done');
    else if (i === state.round && !state.finished) pip.classList.add('cur');
    pip.setAttribute('aria-label',
      i < state.round ? `Round ${i+1} complete` :
      i === state.round ? `Round ${i+1} in progress` :
      `Round ${i+1} upcoming`);
    el.appendChild(pip);
  }
  $('roundlbl').textContent = state.finished
    ? (state.mode === 'freeplay' ? 'Freeplay complete' : 'Daily gauntlet complete')
    : `Round ${state.round+1} — ${ROUND_LENGTHS[state.round]} letters`;
}

function renderModeToggle(){
  $('mode-daily').classList.toggle('active', state.mode === 'daily');
  $('mode-daily').setAttribute('aria-selected', state.mode === 'daily');
  $('mode-freeplay').classList.toggle('active', state.mode === 'freeplay');
  $('mode-freeplay').setAttribute('aria-selected', state.mode === 'freeplay');
}

function buildRow(length, letters, marks, isCurrent){
  const row = document.createElement('div');
  row.className = 'row' + (isCurrent ? ' current' : '');
  for (let i=0;i<length;i++){
    const t = document.createElement('div');
    t.className = 'tile';
    const ch = letters && letters[i] ? letters[i] : '';
    t.textContent = ch;
    if (ch) t.classList.add('filled');
    if (marks && marks[i]) t.classList.add(marks[i]);
    row.appendChild(t);
  }
  return row;
}

function renderBoard(){
  const board = $('board');
  board.innerHTML = '';
  // Guard: when game is finished, state.round may be 5 (out of bounds)
  if (!state || state.round >= state.rounds.length) return;
  const r = state.rounds[state.round];
  const len = r.length;
  for (const g of r.guesses){
    board.appendChild(buildRow(len, g.word.split(''), g.marks, false));
  }
  if (r.status === 'pending' && !state.finished){
    board.appendChild(buildRow(len, currentGuess.padEnd(len,' ').split('').map(c=>c===' '?'':c), null, true));
  }
  board.scrollTop = board.scrollHeight;
}

const KEYBOARD_ROWS = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];
function renderKeyboard(){
  const kb = $('keyboard');
  kb.innerHTML = '';
  // Guard: when game is finished, state.round may be 5 (out of bounds)
  if (!state || state.round >= state.rounds.length) return;
  const r = state.rounds[state.round];
  const keyState = {};
  const RANK = {'green':3, 'amber':2, 'red':1};
  for (const g of r.guesses){
    for (let i=0;i<g.word.length;i++){
      const c = g.word[i], m = g.marks[i];
      if (!keyState[c] || RANK[m] > RANK[keyState[c]]) keyState[c] = m;
    }
  }
  KEYBOARD_ROWS.forEach((row, ri) => {
    const krow = document.createElement('div');
    krow.className = 'krow';
    if (ri === 2){
      const enter = makeKey('ENTER', 'wide');
      enter.addEventListener('click', () => onEnter());
      krow.appendChild(enter);
    }
    for (const ch of row){
      const k = makeKey(ch);
      if (keyState[ch]) k.classList.add(keyState[ch]);
      k.addEventListener('click', () => onLetter(ch));
      krow.appendChild(k);
    }
    if (ri === 2){
      const back = makeKey('⌫', 'wide');
      back.setAttribute('aria-label', 'Backspace');
      back.addEventListener('click', () => onBackspace());
      krow.appendChild(back);
    }
    kb.appendChild(krow);
  });
}
function makeKey(label, extra){
  const b = document.createElement('button');
  b.type = 'button';
  b.className = 'key' + (extra ? ' '+extra : '');
  b.textContent = label;
  return b;
}

function setMessage(msg){ $('message').textContent = msg || ''; }
function announce(msg){ $('sr-live').textContent = msg; }

function toast(text, ms){
  const el = $('toast');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>el.classList.remove('show'), ms || 1400);
}

function startTimer(){
  // Ensure no stale interval from a prior round is still alive.
  clearInterval(timerInterval);
  timerInterval = null;
  const r = state.rounds[state.round];
  // If this round has no guesses yet, treat it as brand-new and zero the
  // clock — defends against any stale r.secs value carried in via state.
  // Rounds with at least one guess are resumed from where they left off.
  if (r.guesses.length === 0) r.secs = 0;
  roundStartMs = Date.now() - (r.secs * 1000);
  // Force the display to update immediately so the user sees the reset.
  const tEl = $('timer');
  if (tEl) tEl.textContent = formatTime(r.secs);
  updateTimer();
  timerInterval = setInterval(updateTimer, 250);
}
function stopTimer(){ clearInterval(timerInterval); timerInterval = null; }
function updateTimer(){
  if (state.finished) return;
  const r = state.rounds[state.round];
  if (r.status !== 'pending') return;
  const elapsed = Math.floor((Date.now() - roundStartMs) / 1000);
  r.secs = elapsed;
  const mm = Math.floor(elapsed / 60), ss = elapsed % 60;
  const tEl = $('timer');
  tEl.textContent = mm + ':' + (ss<10?'0':'') + ss;
  // No time limit — pure stopwatch. Round only ends on correct guess.
  if (elapsed % 5 === 0) saveState();
}

function onLetter(ch){
  if (inputLocked || state.finished) return;
  const r = state.rounds[state.round];
  if (r.status !== 'pending') return;
  if (currentGuess.length < r.length){
    currentGuess += ch.toUpperCase();
    renderBoard();
  }
}
function onBackspace(){
  if (inputLocked || state.finished) return;
  const r = state.rounds[state.round];
  if (r.status !== 'pending') return;
  if (currentGuess.length > 0){
    currentGuess = currentGuess.slice(0, -1);
    renderBoard();
  }
}
function onEnter(){
  if (inputLocked || state.finished) return;
  const r = state.rounds[state.round];
  if (r.status !== 'pending') return;
  if (currentGuess.length !== r.length){
    shakeCurrent('Need ' + r.length + ' letters');
    return;
  }
  const lower = currentGuess.toLowerCase();
  if (!VALID[r.length].has(lower)){
    shakeCurrent('Not a word', true);
    return;
  }
  // Fire-and-forget: submitGuess is async (it talks to /api/guess for
  // daily mode) but does its own animation/state updates internally, so
  // we don't await it here.
  submitGuess(currentGuess);
}

function shakeCurrent(msg, clearAfter){
  const board = $('board');
  const rows = board.querySelectorAll('.row.current');
  if (rows.length){
    const row = rows[0];
    row.classList.remove('shake');
    void row.offsetWidth;
    row.classList.add('shake');
  }
  setMessage(msg);
  setTimeout(()=>setMessage(''), 1400);
  // For invalid-word rejections, wipe the row after the shake finishes so
  // the player can immediately type a new guess without backspacing.
  if (clearAfter){
    inputLocked = true;
    setTimeout(() => {
      currentGuess = '';
      inputLocked = false;
      renderBoard();
    }, 420);
  }
}

async function submitGuess(word){
  const r = state.rounds[state.round];

  // Resolve the marks. For daily mode, the server holds the answer and
  // returns marks (and reveals the answer only on a correct guess). For
  // freeplay, we have the answer locally and validate client-side.
  let marks, answer;
  if (state.mode === 'daily'){
    inputLocked = true; // keep the row frozen during the network round-trip
    try {
      const result = await fetchGuess(state.dayIdx, state.round, word);
      marks = result.marks;
      if (result.correct && result.answer){
        answer = result.answer;
        state.words[state.round] = answer;
      }
      // For non-winning guesses, leave state.words[state.round] as-is
      // (still null until the round resolves). The on-screen marks come
      // from the server and don't require knowing the answer.
    } catch (e) {
      // Network failure or server error. Restore the row so the player
      // can try again, surface a brief message, don't consume the guess.
      inputLocked = false;
      shakeCurrent('Network error');
      return;
    }
  } else {
    answer = state.words[state.round];
    marks = evaluateGuess(word, answer);
  }

  r.guesses.push({ word, marks });
  const isWin = marks.every(m => m === 'green');
  if (!isWin) r.wrong++;
  currentGuess = '';
  inputLocked = true;
  renderBoard();
  const board = $('board');
  const rows = board.querySelectorAll('.row');
  const lastRow = rows[r.guesses.length - 1];
  const tiles = lastRow.querySelectorAll('.tile');
  tiles.forEach((tile, i) => {
    tile.classList.remove('flip','green','amber','red');
    void tile.offsetWidth;
    setTimeout(() => {
      tile.classList.add('flip');
      setTimeout(() => { tile.classList.add(marks[i]); }, 275);
    }, i * 80);
  });
  const totalAnimMs = (tiles.length - 1) * 80 + 600;
  setTimeout(() => {
    renderKeyboard();
    if (isWin){
      r.status = 'won';
      r.secs = Math.floor((Date.now() - roundStartMs) / 1000);
      r.timeScore = calcTimeScore(r.secs);
      r.guessScore = calcGuessScore(r.guesses.length);
      r.score = r.timeScore + r.guessScore;
      stopTimer();
      tiles.forEach((tile, i) => {
        setTimeout(() => tile.classList.add('bounce'), i * 80);
      });
      // For daily mode, `answer` was set above when the guess was correct.
      // For freeplay, it was set from state.words.
      announce('Correct! ' + (answer || word));
      saveState();
      setTimeout(() => showRoundComplete(), 800);
    } else {
      announce('Guess ' + word + ' — ' + marks.join(', '));
      inputLocked = false;
      saveState();
    }
  }, totalAnimMs);
}

// timeoutRound() removed in v1.9 — there's no longer a 12-minute time limit.
// Old saved games may still have a 'timeout' round status; we tolerate it
// in showResults / share text but never produce new ones.

// Remembered so showRoundComplete can be re-shown after exiting review mode
let _lastRoundCompleteTimedOut = false;
function showRoundComplete(timedOut){
  _lastRoundCompleteTimedOut = !!timedOut;
  const r = state.rounds[state.round];
  const answer = state.words[state.round];
  const overlay = $('overlay');
  overlay.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'card';
  // Only show the "Review past rounds" button if there are completed rounds before this one
  const hasPast = state.round > 0;
  const tScore = r.timeScore || 0;
  const gScore = r.guessScore || 0;
  card.innerHTML = `
    <h2>${timedOut ? "Time's up!" : 'Solved'}</h2>
    <div class="word">${answer}</div>
    <div class="stat"><span>Time</span><b>${formatTime(r.secs)} <span style="opacity:.55;font-size:13px">(+${tScore})</span></b></div>
    <div class="stat"><span>Guesses</span><b>${r.guesses.length} <span style="opacity:.55;font-size:13px">(+${gScore})</span></b></div>
    <div class="stat"><span>Round score</span><b id="rscore">0</b></div>
    <button class="btn" id="nextbtn">${state.round < 4 ? 'Next round →' : 'See results →'}</button>
    ${hasPast ? '<button class="btn secondary" id="reviewpastbtn">Review past rounds</button>' : ''}
  `;
  overlay.appendChild(card);
  overlay.classList.add('show');
  countUp($('rscore'), 0, r.score, 700);
  const advance = () => {
    overlay.classList.remove('show');
    state.round++;
    if (state.round >= 5){
      state.finished = true;
      saveState();
      showResults();
    } else {
      currentGuess = '';
      inputLocked = false;
      saveState();
      startRound();
    }
  };
  $('nextbtn').addEventListener('click', advance);
  if (hasPast){
    // Open review at the most recent past round, bounded so prev/next can't reach
    // the current (just-completed) round's "future" siblings.
    $('reviewpastbtn').addEventListener('click', () => {
      enterReviewMode(state.round - 1, { returnTo: 'complete', maxIdx: state.round });
    });
  }
  // No auto-advance — the player must click Next round to continue.
}

function startRound(){
  inputLocked = false;
  // Restore in-progress letters if we're resuming this round
  const r = state.rounds[state.round];
  currentGuess = (state.currentGuess && state.currentGuess.length <= r.length)
    ? state.currentGuess : '';
  setMessage('');
  renderProgress();
  renderBoard();
  renderKeyboard();
  // If this is a truly fresh game (round 0, no guesses, no time elapsed),
  // gate the timer behind a Welcome/Begin screen so the timer doesn't start
  // ticking before the player is ready.
  if (isFreshGameStart()){
    showWelcome();
  } else {
    startTimer();
  }
}

function isFreshGameStart(){
  if (!state || state.finished) return false;
  if (state.round !== 0) return false;
  const r = state.rounds[0];
  return r.guesses.length === 0 && r.secs === 0;
}

// ---- Welcome / Begin gate (shown at fresh game start) ----
function showWelcome(){
  const overlay = $('overlay');
  overlay.innerHTML = '';
  const card = document.createElement('div');
  card.className = 'card';
  const isDaily = state.mode === 'daily';
  card.innerHTML = `
    <h2>How to play</h2>
    ${RULES_HTML}
    <button class="btn" id="welcome-begin">${isDaily ? "Start today's puzzle →" : "Start freeplay →"}</button>
  `;
  overlay.appendChild(card);
  overlay.classList.add('show');
  inputLocked = true;  // disable typing until they hit Begin
  $('welcome-begin').addEventListener('click', () => {
    overlay.classList.remove('show');
    inputLocked = false;
    // Reset the timer baseline so the elapsed counter starts fresh from this click
    roundStartMs = 0;
    state.rounds[state.round].secs = 0;
    startTimer();
  });
}

// ---- Rules side panel (always available via ? button) ----
function showRules(){
  const panel = $('stats-panel');
  panel.innerHTML = `
    <div class="side-panel-header">
      <h2 id="stats-title">How to play</h2>
      <button class="closebtn" id="closerules" aria-label="Close rules">×</button>
    </div>
    ${RULES_HTML}
  `;
  $('closerules').addEventListener('click', closeStatsPanel);
  openStatsPanel();
}

function showResults(){
  stopTimer();
  const overlay = $('overlay');
  overlay.innerHTML = '';
  const total = state.rounds.reduce((s,r)=>s+r.score, 0);
  const rating = ratingFor(total);
  const isFreeplay = state.mode === 'freeplay';
  if (!isFreeplay) recordTodayInHistory();
  const card = document.createElement('div');
  card.className = 'card';
  let rowsHtml = '';
  state.rounds.forEach((r, i) => {
    const lenEmoji = ['3️⃣','4️⃣','5️⃣','6️⃣','7️⃣'][i];
    const tCell = r.status === 'timeout' ? '❌' : formatTime(r.secs);
    const sCell = r.status === 'timeout' ? '0' : r.score;
    rowsHtml += `<tr class="clickable" data-round="${i}"><td>${lenEmoji}</td><td>${tCell}</td><td>${r.guesses.length}</td><td class="score">${sCell}</td></tr>`;
  });
  const heading = isFreeplay ? 'Worgent Freeplay' : `Worgent · ${formatPuzzleDate(state.dayIdx)}`;
  const footer = isFreeplay
    ? '<button class="btn" id="newgamebtn">New game →</button>'
    : '<div class="countdown" id="cd"></div>';
  card.innerHTML = `
    <h2>${heading}</h2>
    <table class="results-table">
      <thead><tr><th>Round</th><th>Time</th><th>Guesses</th><th>Score</th></tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
    <div class="total" id="totalscore">0</div>
    <div class="rating">${rating}</div>
    <button class="btn share" id="sharebtn">Share result</button>
    <button class="btn secondary" id="reviewbtn">Review rounds</button>
    ${isFreeplay ? '' : '<button class="btn secondary" id="viewstatsbtn">View stats</button>'}
    ${isFreeplay ? '' : '<button class="btn secondary" id="tryfreeplaybtn">Play Freeplay →</button>'}
    ${footer}
  `;
  overlay.appendChild(card);
  overlay.classList.add('show');
  countUp($('totalscore'), 0, total, 1000, n => `${n}/10000`);
  $('sharebtn').addEventListener('click', () => doShare(total));
  $('reviewbtn').addEventListener('click', () => enterReviewMode(0));
  // Tap a row to jump straight to that round's review
  card.querySelectorAll('tr.clickable').forEach(tr => {
    tr.addEventListener('click', () => {
      const idx = parseInt(tr.dataset.round, 10);
      enterReviewMode(idx);
    });
  });
  if (!isFreeplay){
    $('viewstatsbtn').addEventListener('click', showStats);
    $('tryfreeplaybtn').addEventListener('click', () => {
      localStorage.setItem(STORAGE_MODE, 'freeplay');
      startNewFreeplay();
    });
    startCountdown();
  } else {
    $('newgamebtn').addEventListener('click', startNewFreeplay);
  }
  state.round = 5;
  renderProgress();
  $('roundlbl').textContent = isFreeplay ? 'Freeplay complete' : 'Daily gauntlet complete';
  $('timer').textContent = formatTime(state.rounds.reduce((s,r)=>s+r.secs,0));
  $('timer').classList.remove('urgent');
}

function ratingFor(total){
  // Scale: max possible is 10000 (5 rounds × 2000 = 1000 time + 1000 guess each)
  if (total >= 9000) return 'Legendary 🔥';
  if (total >= 7000) return 'Excellent';
  if (total >= 5000) return 'Solid';
  if (total >= 2000) return 'Keep practicing';
  return 'Rough day';
}

function buildShareText(total){
  // Use middle-dot · instead of | as a separator. Pipes are commonly used in
  // phone/vCard formats, and Facebook Messenger's contact-detection has been
  // observed to misread our score lines as phone numbers and attach unrelated
  // WhatsApp contact suggestions. The middle dot avoids that.
  const isFreeplay = state.mode === 'freeplay';
  const heading = isFreeplay
    ? `Worgent Freeplay — ${total} of 10000`
    : `Worgent · ${formatPuzzleDate(state.dayIdx)} — ${total} of 10000`;
  const lines = [heading, ''];
  const lenEmoji = ['3️⃣','4️⃣','5️⃣','6️⃣','7️⃣'];
  state.rounds.forEach((r, i) => {
    if (r.status === 'timeout'){
      lines.push(`${lenEmoji[i]} ❌ · ${r.guesses.length} guess(es)`);
    } else {
      const g = r.guesses.length;
      lines.push(`${lenEmoji[i]} ${r.score} pts · ⏱${formatTime(r.secs)} · ${g} guess${g===1?'':'(es)'}`);
    }
  });
  lines.push('');
  lines.push('https://worgent.com');
  return lines.join('\n');
}

async function doShare(total){
  const text = buildShareText(total);
  try {
    if (navigator.share){
      // The URL is already included in `text`; passing it separately caused
      // it to appear twice on platforms that render both fields.
      await navigator.share({ text, title: 'Worgent' });
      return;
    }
  } catch(e){}
  try {
    await navigator.clipboard.writeText(text);
    toast('Copied!');
  } catch(e){
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); toast('Copied!'); } catch(e2){ toast('Copy failed'); }
    document.body.removeChild(ta);
  }
}

// ---- mode switching ----
async function switchMode(targetMode){
  if (state && state.mode === targetMode) return;
  // Force-flush timer + currentGuess into state, then save
  if (state){
    syncTimerToState();
    state.currentGuess = currentGuess;
    saveState();
  }
  stopTimer();
  $('overlay').classList.remove('show');
  closeStatsPanel();
  // Load (or create) state for target mode. Async because loadState may
  // need to fetch freeplay words from the server when starting a new
  // freeplay game.
  state = await loadState(targetMode);
  // Restore the target mode's in-progress letters (or empty if none)
  inputLocked = false;
  currentGuess = state.currentGuess || '';
  localStorage.setItem(STORAGE_MODE, targetMode);
  renderModeToggle();
  if (state.finished){
    // Game already complete — clamp round to a valid index, skip board/keyboard
    // (the overlay covers them), and show the results card immediately.
    if (state.round >= state.rounds.length) state.round = state.rounds.length - 1;
    renderProgress();
    showResults();
    return;
  }
  let r = state.round;
  while (r < 5 && state.rounds[r].status !== 'pending'){ r++; }
  if (r >= 5){
    state.finished = true;
    saveState();
    renderProgress();
    showResults();
    return;
  }
  state.round = r;
  startRound();
}

// ---- review mode (browse rounds — usable after game complete OR mid-game from round-complete card) ----
let reviewIndex = 0;
let reviewMaxIdx = 4;          // upper bound for prev/next arrows (inclusive)
let reviewReturnTo = 'results'; // 'results' | 'complete'
function enterReviewMode(idx, opts){
  // Allow review either when the game is finished (full review) OR when called
  // from the round-complete card mid-game (must pass returnTo:'complete').
  if (!state) return;
  const returnTo = (opts && opts.returnTo) || 'results';
  if (returnTo === 'results' && !state.finished) return;
  reviewReturnTo = returnTo;
  reviewMaxIdx = (opts && typeof opts.maxIdx === 'number') ? opts.maxIdx : 4;
  reviewIndex = Math.max(0, Math.min(reviewMaxIdx, idx | 0));
  $('overlay').classList.remove('show');
  renderReview();
}
function renderReview(){
  const r = state.rounds[reviewIndex];
  const ans = state.words[reviewIndex];
  const lenLabel = ['Round 1','Round 2','Round 3','Round 4','Round 5'][reviewIndex];
  // Replace the message strip with a review navigation bar
  const msg = $('message');
  msg.innerHTML = `
    <div class="review-bar" role="region" aria-label="Round review">
      <button class="review-arrow" id="rv-prev" aria-label="Previous round">‹</button>
      <div class="review-info">${lenLabel} — ${r.length} letters<b>${ans}</b></div>
      <button class="review-arrow" id="rv-next" aria-label="Next round">›</button>
    </div>
    <button class="review-back" id="rv-back">${reviewReturnTo === 'complete' ? '← Back to round result' : '← Back to results'}</button>
  `;
  $('rv-prev').disabled = (reviewIndex === 0);
  $('rv-next').disabled = (reviewIndex >= reviewMaxIdx);
  $('rv-prev').addEventListener('click', () => { if (reviewIndex>0){ reviewIndex--; renderReview(); }});
  $('rv-next').addEventListener('click', () => { if (reviewIndex<reviewMaxIdx){ reviewIndex++; renderReview(); }});
  $('rv-back').addEventListener('click', exitReviewMode);
  // Render the board for that round
  const board = $('board');
  board.innerHTML = '';
  if (r.guesses.length === 0){
    // Round was a timeout with no guesses — show the answer only
    board.appendChild(buildRow(r.length, ans.split(''), new Array(r.length).fill('green'), false));
  } else {
    for (const g of r.guesses){
      board.appendChild(buildRow(r.length, g.word.split(''), g.marks, false));
    }
    // If they didn't get it right, append the answer row in green for clarity
    const won = r.guesses[r.guesses.length-1].marks.every(m => m === 'green');
    if (!won){
      board.appendChild(buildRow(r.length, ans.split(''), new Array(r.length).fill('green'), false));
    }
  }
  // Update header round label and timer to reflect this round's stats
  $('roundlbl').textContent = `Reviewing — ${r.length} letters`;
  $('timer').textContent = formatTime(r.secs);
  $('timer').classList.remove('urgent');
  // Hide the keyboard while reviewing (you're not playing)
  $('keyboard').style.display = 'none';
  // Pip indicator: highlight the current review round in amber
  const pips = $('progress').querySelectorAll('.pip');
  pips.forEach((p, i) => {
    p.classList.remove('cur');
    if (i === reviewIndex) p.classList.add('cur');
  });
}
function exitReviewMode(){
  // Restore the keyboard, clear the review bar, and re-show the appropriate screen
  $('message').innerHTML = '';
  $('keyboard').style.display = '';
  if (reviewReturnTo === 'complete'){
    showRoundComplete(_lastRoundCompleteTimedOut);
  } else {
    showResults();
  }
}

async function startNewFreeplay(){
  $('overlay').classList.remove('show');
  localStorage.removeItem(STORAGE_KEY_FREEPLAY);
  // freshState is async — it fetches a fresh set of freeplay words
  // from the server before returning.
  state = await freshState('freeplay');
  saveState();
  inputLocked = false;
  currentGuess = '';
  renderModeToggle();
  startRound();
}

// ---- stats SIDE PANEL ----
function openStatsPanel(){
  const panel = $('stats-panel');
  const backdrop = $('panel-backdrop');
  panel.hidden = false;
  void panel.offsetWidth;
  panel.classList.add('show');
  backdrop.classList.add('show');
}
function closeStatsPanel(){
  const panel = $('stats-panel');
  const backdrop = $('panel-backdrop');
  if (!panel.classList.contains('show')) return;
  panel.classList.remove('show');
  backdrop.classList.remove('show');
  setTimeout(() => { panel.hidden = true; }, 320);
}

function showStats(){
  const history = loadHistory();
  const s = computeStats(history);
  const panel = $('stats-panel');

  // 10 bins of 1000 points each → covers full 0–10000 range
  const bins = new Array(10).fill(0);
  for (const t of s.totals){
    const i = Math.min(9, Math.floor(t / 1000));
    bins[i]++;
  }
  const maxBin = Math.max(1, ...bins);
  const todayEntry = history.find(g => g.dayIdx === dayIdx);
  const curBin = todayEntry ? Math.min(9, Math.floor(todayEntry.total / 1000)) : -1;
  const histoHtml = bins.map((n, i) => {
    const h = Math.round(100 * n / maxBin);
    const cls = i === curBin ? 'histo-bar cur' : 'histo-bar';
    return `<div class="${cls}" style="height:${h}%" title="${i*1000}-${(i+1)*1000}: ${n} game${n===1?'':'s'}"></div>`;
  }).join('');

  let perRoundHtml = '';
  if (s.games > 0){
    perRoundHtml = `
      <div class="section-title">Per-length breakdown</div>
      <table class="perround-table">
        <thead><tr><th>Len</th><th>Played</th><th>Win %</th><th>Best time</th><th>Avg score</th><th>Avg guess</th></tr></thead>
        <tbody>
        ${ROUND_LENGTHS.map(L => {
          const p = s.perLen[L];
          const fast = p.fastest != null ? formatTime(p.fastest) : '—';
          return `<tr><td>${L}</td><td>${p.played}</td><td>${p.winPct}%</td><td>${fast}</td><td>${p.avgScore}</td><td>${p.avgGuess}</td></tr>`;
        }).join('')}
        </tbody>
      </table>`;
  }

  let histoBlock = '';
  if (s.games > 0){
    histoBlock = `
      <div class="section-title">Score distribution</div>
      <div class="histo">${histoHtml}</div>
      <div class="histo-axis"><span>0</span><span>5000</span><span>10000</span></div>`;
  }

  const emptyMsg = s.games === 0
    ? '<div class="empty-msg">No daily games yet. Finish today’s puzzle to start your stats.<br><br>(Freeplay games don’t affect stats.)</div>'
    : '<div class="empty-msg" style="font-size:11px;padding:6px 4px;">Stats only count Daily games. Freeplay is excluded.</div>';

  panel.innerHTML = `
    <div class="side-panel-header">
      <h2 id="stats-title">Daily stats</h2>
      <button class="closebtn" id="closestats" aria-label="Close stats">×</button>
    </div>
    <div class="stats-grid">
      <div class="stat-tile"><b>${s.games}</b><span>Played</span></div>
      <div class="stat-tile"><b>${s.streak}</b><span>Streak</span></div>
      <div class="stat-tile"><b>${s.maxStreak}</b><span>Max streak</span></div>
      <div class="stat-tile"><b>${s.best}</b><span>Best score</span></div>
      <div class="stat-tile"><b>${s.avg}</b><span>Avg score</span></div>
      <div class="stat-tile"><b>${s.winRate}%</b><span>Win rate</span></div>
    </div>
    ${emptyMsg}
    ${perRoundHtml}
    ${histoBlock}
  `;
  $('closestats').addEventListener('click', closeStatsPanel);
  openStatsPanel();
}

function startCountdown(){
  const tick = () => {
    const cd = $('cd');
    if (!cd) return;
    const now = new Date();
    const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1);
    const diff = tomorrow - now;
    const h = Math.floor(diff/3600000);
    const m = Math.floor((diff%3600000)/60000);
    const s = Math.floor((diff%60000)/1000);
    cd.textContent = `Next puzzle in ${h}h ${m}m ${String(s).padStart(2,'0')}s`;
    if (diff < 0) location.reload();
  };
  tick();
  clearInterval(window._cdInt);
  window._cdInt = setInterval(tick, 1000);
}

function formatTime(s){
  if (s == null) return '0:00';
  const m = Math.floor(s/60), ss = s % 60;
  return m + ':' + (ss<10?'0':'') + ss;
}

function countUp(el, from, to, ms, fmt){
  const t0 = performance.now();
  fmt = fmt || (n => String(n));
  function step(now){
    const t = Math.min(1, (now - t0)/ms);
    const v = Math.round(from + (to - from)*easeOutCubic(t));
    el.textContent = fmt(v);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
function easeOutCubic(t){ return 1 - Math.pow(1-t,3); }

function bindPhysicalKeyboard(){
  document.addEventListener('keydown', (e) => {
    if (state.finished) return;
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (e.key === 'Enter'){ e.preventDefault(); onEnter(); return; }
    if (e.key === 'Backspace'){ e.preventDefault(); onBackspace(); return; }
    if (/^[a-zA-Z]$/.test(e.key)){ onLetter(e.key); }
  });
}

function bindVisibilityHandlers(){
  window.addEventListener('beforeunload', () => { try { saveState(); } catch(e){} });
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') { try { saveState(); } catch(e){} }
  });
}

async function init(){
  const savedMode = localStorage.getItem(STORAGE_MODE);
  const startMode = (savedMode === 'freeplay') ? 'freeplay' : 'daily';
  state = await loadState(startMode);
  currentGuess = state.currentGuess || '';
  bindPhysicalKeyboard();
  bindVisibilityHandlers();
  const sb = $('statsbtn');
  if (sb) sb.addEventListener('click', showStats);
  const rb = $('rulesbtn');
  if (rb) rb.addEventListener('click', showRules);
  $('mode-daily').addEventListener('click', () => switchMode('daily'));
  $('mode-freeplay').addEventListener('click', () => switchMode('freeplay'));
  const bd = $('panel-backdrop');
  if (bd) bd.addEventListener('click', closeStatsPanel);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && $('stats-panel') && $('stats-panel').classList.contains('show')){
      closeStatsPanel();
    }
  });
  renderModeToggle();
  if (state.finished){
    if (state.round >= state.rounds.length) state.round = state.rounds.length - 1;
    renderProgress();
    showResults();
    return;
  }
  let r = state.round;
  while (r < 5 && state.rounds[r].status !== 'pending'){ r++; }
  if (r >= 5){
    state.finished = true;
    saveState();
    renderProgress();
    showResults();
    return;
  }
  state.round = r;
  startRound();
}

document.addEventListener('DOMContentLoaded', init);

</script>
